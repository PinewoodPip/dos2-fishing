site_name: Fishermancy Class Overhaul Ultimate
site_url: https://pinewood.team/dos2-fishing/
repo_url: https://github.com/pinewoodpip/dos2-fishing/
theme:
  name: material
  collapse_navigation: false
  navigation_depth: 3
  logo: img/favicon.png
  favicon: img/favicon.png
markdown_extensions:
    - pymdownx.highlight:
        anchor_linenums: true
    - toc:
        permalink: True
    - pymdownx.inlinehilite
    - pymdownx.snippets
    - pymdownx.superfences
    - pymdownx.caret
    - pymdownx.mark
    - pymdownx.tilde
    - pymdownx.details
    - pymdownx.keys:
        key_map: {
          "m1": "Left Mouse Button",
          "m2": "Right Mouse Button",
          "m3": "Middle Mouse Button",
          "m4": "Mouse M4",
          "m5": "Mouse M5",
        }
    - admonition
    - attr_list
    - md_in_html
extra:
  analytics:
    provider: google
    property: G-MYBLME5L7N
extra_css:
  - css/extra.css
extra_javascript:
  - js/extra.js
plugins:
  - search
  - meta-descriptions
  - mkdocs-video:
      css_style:
        height: "400px"
        width: "100%"

nav:
  - Home: index.md
  - Installation & patchnotes: patchnotes.md
  - Fishing: Fishing/index.md
  - Fishermancy: Fishermancy/index.md
  - Fish Essences: FishEssences/index.md
  - Fishing Trader: Trader/index.md